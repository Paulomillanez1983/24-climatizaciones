    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="28" stdDeviation="28" flood-color="#071226" flood-opacity=".22"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="184" cy="112" r="380" fill="url(#coldGlow)"/>
  <circle cx="1028" cy="542" r="410" fill="url(#warmGlow)"/>
  <path d="M0 580C194 512 327 604 508 548c197-61 318-212 532-157 84 22 132 63 160 92v147H0Z" fill="#071226" opacity=".045"/>

