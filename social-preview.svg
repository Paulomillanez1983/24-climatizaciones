    <rect x="24" y="24" width="290" height="290" rx="74" fill="none" stroke="#ffffff" stroke-opacity=".24" stroke-width="8"/>
    <circle cx="88" cy="92" r="106" fill="#1cc8ff" opacity=".20"/>
