<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">24 Climatizaciones</title>
  <desc id="desc">Imagen de vista previa social de 24 Climatizaciones con una casa a 24 grados y climatización frío calor.</desc>
  <defs>
    <linearGradient id="bg" x1="88" y1="52" x2="1112" y2="578" gradientUnits="userSpaceOnUse">
      <stop stop-color="#eef8ff"/>
      <stop offset=".42" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#fff1e5"/>
    </linearGradient>
    <linearGradient id="logoBg" x1="248" y1="108" x2="515" y2="386" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1cc8ff"/>
      <stop offset=".34" stop-color="#1677ff"/>
      <stop offset=".58" stop-color="#071226"/>
      <stop offset="1" stop-color="#ff7a1a"/>
    </linearGradient>
    <linearGradient id="house" x1="333" y1="185" x2="430" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff"/>
      <stop offset="1" stop-color="#dff4ff"/>
    </linearGradient>
    <radialGradient id="coldGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(196 104) rotate(45) scale(410)">
      <stop stop-color="#1cc8ff" stop-opacity=".34"/>
      <stop offset="1" stop-color="#1cc8ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="warmGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1022 540) rotate(135) scale(410)">
      <stop stop-color="#ff7a1a" stop-opacity=".27"/>
