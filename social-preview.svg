    <text x="219" y="183" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="900" fill="#071226">°</text>
    <path d="M135 250h68" stroke="#1677ff" stroke-width="8" stroke-linecap="round"/>
    <path d="M135 269h68" stroke="#ff7a1a" stroke-width="8" stroke-linecap="round"/>
