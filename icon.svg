<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">24 Climatizaciones</title>
  <desc id="desc">Casa con temperatura 24 grados, nieve y calor orbitando.</desc>
  <defs>
    <linearGradient id="bg" x1="72" y1="60" x2="438" y2="452" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1cc8ff"/>
      <stop offset=".34" stop-color="#1677ff"/>
      <stop offset=".58" stop-color="#071226"/>
      <stop offset="1" stop-color="#ff7a1a"/>
    </linearGradient>
    <linearGradient id="house" x1="164" y1="130" x2="344" y2="380" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff"/>
      <stop offset="1" stop-color="#dff4ff"/>
    </linearGradient>
    <radialGradient id="coldGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(142 146) rotate(45) scale(164)">
      <stop stop-color="#dffaff" stop-opacity=".95"/>
      <stop offset="1" stop-color="#1cc8ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="warmGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(382 376) rotate(135) scale(172)">
      <stop stop-color="#ffbd59" stop-opacity=".84"/>
      <stop offset="1" stop-color="#ff7a1a" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#061126" flood-opacity=".30"/>
    </filter>
  </defs>

  <rect x="40" y="40" width="432" height="432" rx="128" fill="url(#bg)"/>
  <circle cx="142" cy="146" r="162" fill="url(#coldGlow)"/>
  <circle cx="378" cy="372" r="168" fill="url(#warmGlow)"/>
  <rect x="70" y="70" width="372" height="372" rx="104" fill="none" stroke="#fff" stroke-opacity=".24" stroke-width="10"/>

  <g opacity=".92" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <g transform="translate(116 142)" stroke="#eafcff" stroke-width="13">
      <path d="M0-38v76"/>
      <path d="M-33-19 33 19"/>
      <path d="M33-19-33 19"/>
      <circle r="8" fill="#eafcff" stroke="none"/>
    </g>
    <path d="M374 152c-11 21 4 33 14 46 13 17 8 42-15 54-35 18-76-8-73-48 1-18 12-32 23-43-2 23 21 34 32 17 6-9 2-18 19-26z" fill="#ffd28d" stroke="#fff6e8" stroke-width="7"/>
  </g>

  <g filter="url(#softShadow)">
    <path d="M256 126 366 226h-34v134H180V226h-34L256 126z" fill="url(#house)"/>
    <path d="M180 226 256 126l76 100v134H180V226z" fill="none" stroke="#ffffff" stroke-width="12" stroke-linejoin="round" stroke-opacity=".95"/>
    <text x="252" y="297" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="98" font-weight="900" fill="#071226" letter-spacing="-8">24</text>
    <text x="318" y="247" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="900" fill="#071226">°</text>
    <path d="M214 326h84" stroke="#1677ff" stroke-width="10" stroke-linecap="round"/>
    <path d="M214 348h84" stroke="#ff7a1a" stroke-width="10" stroke-linecap="round"/>
  </g>

  <path d="M111 384c86 48 201 50 290 0" fill="none" stroke="#ffffff" stroke-opacity=".28" stroke-width="9" stroke-linecap="round"/>
</svg>
